<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCC</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS ============ */
:root, :root[data-theme="dark"]{
  --bg0:#0A0D13; --bg1:#10141D; --bg2:#151B26; --bg3:#1C2432; --bg4:#26303F;
  --line:#212A38; --line2:#344256;
  --tx1:#EDF1F8; --tx2:#9CA8BC; --tx3:#69778E;
  --acc:#5B8CFF; --acc2:#8FB0FF; --acc-soft:rgba(91,140,255,.14);
  --grad:linear-gradient(135deg,#6D8DFF 0%,#9E7BFF 100%);
  --red:#FF7A6E; --amber:#FFB454; --yellow:#F2D268; --green:#4ADE93;
  --teal:#3ED6C4; --purple:#B9A0FF; --blue:#6AB6FF; --grey:#8B98AC;
  --shadow:0 1px 2px rgba(0,0,0,.45),0 10px 28px -14px rgba(0,0,0,.55);
  --shadow-sm:0 1px 2px rgba(0,0,0,.35);
  --glass:rgba(10,13,19,.86);
  --radius:12px; --radius-sm:8px;
  color-scheme:dark;
  font-size:15px;
}
:root[data-theme="light"]{
  --bg0:#F3F5F9; --bg1:#FFFFFF; --bg2:#FFFFFF; --bg3:#F2F4F9; --bg4:#E7EBF3;
  --line:#E3E8F0; --line2:#C6D0DF;
  --tx1:#1A2233; --tx2:#57647A; --tx3:#8894A8;
  --acc:#3B6FE0; --acc2:#2F5BBF; --acc-soft:rgba(59,111,224,.10);
  --grad:linear-gradient(135deg,#4A78EC 0%,#7B5BE6 100%);
  --red:#D63C30; --amber:#C1660A; --yellow:#9C7C10; --green:#0E8A50;
  --teal:#0D857A; --purple:#7048D8; --blue:#1467C4; --grey:#68758B;
  --shadow:0 1px 2px rgba(23,33,60,.06),0 10px 30px -18px rgba(23,33,60,.22);
  --shadow-sm:0 1px 2px rgba(23,33,60,.07);
  --glass:rgba(243,245,249,.88);
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg0);
  background-image:radial-gradient(1200px 500px at 15% -10%, var(--acc-soft), transparent 60%);
  color:var(--tx1);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-optical-sizing:auto;line-height:1.5;padding-bottom:90px;
  -webkit-font-smoothing:antialiased;
}
h1{font-size:1.12rem;font-weight:800;letter-spacing:-.015em}
h2{font-size:1.02rem;font-weight:700;letter-spacing:-.01em;margin:0 0 10px}
h3{font-size:.92rem;font-weight:600}
a{color:var(--acc2)}
button{cursor:pointer;font-family:inherit}
::selection{background:var(--acc-soft)}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.85em}
.num{font-variant-numeric:tabular-nums}
*:focus-visible{outline:2px solid var(--acc);outline-offset:2px;border-radius:4px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:6px;border:2px solid var(--bg0)}
::-webkit-scrollbar-thumb:hover{background:var(--line2)}
::-webkit-scrollbar-track{background:transparent}

/* ============ HEADER ============ */
header{position:sticky;top:0;z-index:50;background:var(--glass);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:11px}
.logo{width:34px;height:34px;border-radius:9px;background:var(--grad);display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;box-shadow:0 4px 14px -4px rgba(109,141,255,.55);flex-shrink:0}
header .sub{color:var(--tx3);font-size:.73rem;margin-top:1px}
header .spacer{flex:1}
.hbtn{background:var(--bg2);border:1px solid var(--line);color:var(--tx2);border-radius:8px;padding:6px 11px;
  font-size:.74rem;font-weight:600;transition:all .15s ease;box-shadow:var(--shadow-sm)}
.hbtn:hover{color:var(--tx1);border-color:var(--line2);transform:translateY(-1px)}
.hbtn:active{transform:translateY(0)}
.hbtn.primary{background:var(--acc);border-color:var(--acc);color:#fff}
#theme-btn{font-size:.9rem;padding:5px 9px}

/* ============ NAV ============ */
nav{position:sticky;top:56px;z-index:49;background:var(--glass);backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);display:flex;gap:2px;padding:6px 14px 0;overflow-x:auto}
nav::-webkit-scrollbar{display:none}
nav button{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);
  padding:9px 13px 11px;font-size:.85rem;font-weight:600;white-space:nowrap;border-radius:8px 8px 0 0;transition:color .15s,background .15s}
nav button.active{color:var(--tx1);border-bottom-color:var(--acc);background:linear-gradient(to top,var(--acc-soft),transparent 70%)}
nav button:hover{color:var(--tx1)}
nav .cnt{display:inline-block;background:var(--bg4);border-radius:20px;padding:0 7px;font-size:.68rem;margin-left:6px;
  color:var(--tx2);font-variant-numeric:tabular-nums}
nav button.active .cnt{background:var(--acc);color:#fff}

main{max-width:1480px;margin:0 auto;padding:20px 18px}
section.tab{display:none;animation:fadein .18s ease}
section.tab.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ============ STAT CARDS ============ */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:20px}
.card{background:var(--bg1);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px 12px;
  box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.card::before{content:"";position:absolute;inset:0 auto 0 0;width:3px;background:var(--grey);opacity:.85}
.card .n{font-size:1.6rem;font-weight:800;line-height:1.15;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--tx1)}
.card .l{font-size:.66rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-top:4px}
.card.crit::before{background:var(--red)} .card.crit .n{color:var(--red)}
.card.high::before{background:var(--amber)} .card.high .n{color:var(--amber)}
.card.warn::before{background:var(--amber)} .card.warn .n{color:var(--amber)}
.card.ok::before{background:var(--green)} .card.ok .n{color:var(--green)}
.card.wait::before{background:var(--purple)} .card.wait .n{color:var(--purple)}
.card.acc::before{background:var(--acc)} .card.acc .n{color:var(--acc2)}

/* ============ PANELS ============ */
.panel{background:var(--bg1);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.panel.tight{padding:12px 15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

/* ============ BADGES ============ */
.b{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:1.5px 9px;font-size:.68rem;
  font-weight:600;letter-spacing:.015em;vertical-align:1px;white-space:nowrap}
.b::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.b.etype::before{display:none}
.b.P-Critical{background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red)}
.b.P-High{background:color-mix(in srgb,var(--amber) 14%,transparent);color:var(--amber)}
.b.P-Medium{background:color-mix(in srgb,var(--yellow) 14%,transparent);color:var(--yellow)}
.b.P-Low{background:color-mix(in srgb,var(--grey) 16%,transparent);color:var(--grey)}
.b.S-NotStarted{background:color-mix(in srgb,var(--grey) 16%,transparent);color:var(--grey)}
.b.S-Ready{background:color-mix(in srgb,var(--teal) 14%,transparent);color:var(--teal)}
.b.S-InProgress{background:color-mix(in srgb,var(--blue) 14%,transparent);color:var(--blue)}
.b.S-Waiting{background:color-mix(in srgb,var(--purple) 14%,transparent);color:var(--purple)}
.b.S-Blocked{background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red)}
.b.S-NeedsReview{background:color-mix(in srgb,var(--teal) 14%,transparent);color:var(--teal)}
.b.S-Scheduled,.b.S-Completed{background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green)}
.b.S-Cancelled{background:color-mix(in srgb,var(--grey) 14%,transparent);color:var(--tx3)}
.b.proj{background:var(--bg3);color:var(--tx2);border:1px solid var(--line)}
.b.conf-High{background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green)}
.b.conf-Medium{background:color-mix(in srgb,var(--yellow) 14%,transparent);color:var(--yellow)}
.b.conf-Low{background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red)}
.b.etype{background:var(--acc-soft);color:var(--acc2)}
.chip{display:inline-block;background:var(--bg3);border:1px solid var(--line);border-radius:20px;padding:2.5px 11px;
  font-size:.72rem;color:var(--tx2);margin:2px 4px 2px 0;transition:border-color .15s}
.chip:hover{border-color:var(--acc)}
.overdue{color:var(--red);font-weight:700}
.duesoon{color:var(--amber);font-weight:600}
.scorepill{display:inline-block;min-width:34px;text-align:center;background:var(--acc-soft);color:var(--acc2);
  border-radius:7px;padding:1px 7px;font-weight:700;font-size:.78rem;font-variant-numeric:tabular-nums}

/* ============ TABLE ============ */
.tblwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg1);box-shadow:var(--shadow-sm)}
table{border-collapse:collapse;width:100%;font-size:.83rem}
th{position:sticky;top:0;z-index:2;background:var(--bg2);text-align:left;padding:9px 11px;font-size:.66rem;
  text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);white-space:nowrap;cursor:pointer;user-select:none;
  border-bottom:1px solid var(--line);font-weight:700}
th:hover{color:var(--tx1)}
td{padding:8px 11px;border-bottom:1px solid var(--line);vertical-align:top;font-variant-numeric:tabular-nums}
tbody tr:last-child td{border-bottom:none}
tr.trow{transition:background .12s}
tr.trow:hover td{background:var(--bg3)}
tr.done td .ttl{text-decoration:line-through;color:var(--tx3)}
td .ttl{font-weight:600;cursor:pointer}
td .ttl:hover{color:var(--acc2)}
.detail{background:var(--bg2)!important;padding:16px 18px!important;box-shadow:inset 0 2px 6px -4px rgba(0,0,0,.4)}
.detail .drow{display:grid;grid-template-columns:150px 1fr;gap:4px 14px;font-size:.82rem;margin-bottom:3px}
.detail .dl{color:var(--tx3);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding-top:2px}

/* ============ FILTERS / INPUTS ============ */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.filters select,.filters input,
.editform input,.editform select,.editform textarea{
  background:var(--bg2);border:1px solid var(--line);color:var(--tx1);border-radius:8px;padding:6px 9px;
  font-size:.8rem;font-family:inherit;transition:border-color .15s}
.filters select:hover,.filters input:hover{border-color:var(--line2)}
.filters select:focus,.filters input:focus,.editform input:focus,.editform select:focus{border-color:var(--acc);outline:none}
.filters input[type=search]{min-width:220px}
.filters label.ck{font-size:.76rem;color:var(--tx2);display:flex;align-items:center;gap:5px;background:var(--bg2);
  border:1px solid var(--line);border-radius:8px;padding:6px 10px}
input[type=checkbox]{accent-color:var(--acc);width:15px;height:15px}
.editform{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:9px;margin-top:12px;
  padding-top:12px;border-top:1px dashed var(--line)}
.editform label{font-size:.64rem;color:var(--tx3);display:block;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px}
.editform input,.editform select{width:100%}
.editform .full{grid-column:1/-1}

/* ============ TODAY ============ */
.todo-item{display:flex;gap:14px;background:var(--bg1);border:1px solid var(--line);border-radius:var(--radius);
  padding:15px 16px;margin-bottom:10px;align-items:flex-start;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s,border-color .15s}
.todo-item:hover{transform:translateY(-1px);box-shadow:var(--shadow);border-color:var(--line2)}
.todo-item .rank{font-size:1.15rem;font-weight:800;min-width:32px;height:32px;border-radius:9px;background:var(--grad);
  color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px -5px rgba(109,141,255,.6)}
.todo-item .why{color:var(--tx2);font-size:.82rem;margin-top:6px}
.todo-item .meta{margin-top:6px;font-size:.74rem;color:var(--tx3)}
.todo-item input[type=checkbox]{width:18px;height:18px;margin-top:7px}
.todo-item.donei{opacity:.45}

/* ============ PROJECTS ============ */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.pcard{background:var(--bg1);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-sm);
  transition:transform .15s,box-shadow .15s}
.pcard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.pcard h3{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px;font-size:.98rem;font-weight:700}
.pcard .obj{color:var(--tx2);font-size:.8rem;margin-bottom:10px;line-height:1.45}
.pcard .krow{font-size:.78rem;margin:4px 0;display:flex;gap:8px}
.pcard .krow .k{color:var(--tx3);min-width:98px;flex-shrink:0;font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding-top:2px}
.b.H-OnTrack{background:color-mix(in srgb,var(--green) 14%,transparent);color:var(--green)}
.b.H-AtRisk{background:color-mix(in srgb,var(--amber) 14%,transparent);color:var(--amber)}
.b.H-Blocked{background:color-mix(in srgb,var(--red) 14%,transparent);color:var(--red)}
.b.H-Stalled{background:color-mix(in srgb,var(--grey) 16%,transparent);color:var(--grey)}
.b.H-NeedsReview{background:color-mix(in srgb,var(--teal) 14%,transparent);color:var(--teal)}
.hbar{height:6px;border-radius:4px;background:var(--bg4);margin:10px 0;overflow:hidden}
.hbar>div{height:100%;background:var(--grad);border-radius:4px;transition:width .4s ease}

/* ============ KANBAN ============ */
.kb{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}
.kcol{min-width:242px;width:242px;flex-shrink:0;background:var(--bg1);border:1px solid var(--line);border-radius:var(--radius);
  display:flex;flex-direction:column;max-height:76vh;box-shadow:var(--shadow-sm)}
.kcol h3{padding:11px 13px;border-bottom:1px solid var(--line);font-size:.72rem;text-transform:uppercase;
  letter-spacing:.07em;color:var(--tx2);display:flex;align-items:center;gap:7px;font-weight:700}
.kcol h3 .kcnt{margin-left:auto;background:var(--bg4);border-radius:20px;padding:0 8px;font-size:.68rem;font-variant-numeric:tabular-nums}
.kdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kdot.k-NotStarted{background:var(--grey)} .kdot.k-Ready{background:var(--teal)} .kdot.k-InProgress{background:var(--blue)}
.kdot.k-Waiting{background:var(--purple)} .kdot.k-Blocked{background:var(--red)} .kdot.k-NeedsReview{background:var(--teal)}
.kdot.k-Completed{background:var(--green)}
.kcol .kbody{padding:9px;overflow-y:auto;flex:1;min-height:60px}
.kcol.dragover{outline:2px dashed var(--acc);outline-offset:-4px}
.kcard{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:8px;
  font-size:.8rem;cursor:grab;transition:border-color .15s,transform .12s;box-shadow:var(--shadow-sm)}
.kcard:hover{border-color:var(--acc);transform:translateY(-1px)}
.kcard:active{cursor:grabbing}
.kcard .t{font-weight:600;margin-bottom:5px;line-height:1.35}
.kcard .m{color:var(--tx3);font-size:.71rem}

/* ============ MATRIX ============ */
.mx{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:800px){.mx{grid-template-columns:1fr}}
.mq{border:1px solid var(--line);border-radius:var(--radius);padding:14px;min-height:170px;box-shadow:var(--shadow-sm)}
.mq h3{margin-bottom:4px;font-size:.76rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.mq.q1{background:linear-gradient(160deg,color-mix(in srgb,var(--red) 7%,var(--bg1)),var(--bg1) 55%)}
.mq.q2{background:linear-gradient(160deg,color-mix(in srgb,var(--acc) 7%,var(--bg1)),var(--bg1) 55%)}
.mq.q3{background:linear-gradient(160deg,color-mix(in srgb,var(--amber) 7%,var(--bg1)),var(--bg1) 55%)}
.mq.q4{background:var(--bg1)}
.mq.q1 h3{color:var(--red)}.mq.q2 h3{color:var(--acc2)}.mq.q3 h3{color:var(--amber)}.mq.q4 h3{color:var(--tx3)}
.mq .mi{font-size:.8rem;padding:6px 9px;border-radius:8px;background:var(--bg2);border:1px solid var(--line);
  margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.mq .mi:hover{border-color:var(--acc)}

/* ============ PLANNER ============ */
.pl-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
@media(max-width:1100px){.week{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.week{grid-template-columns:1fr}}
.day{background:var(--bg1);border:1px solid var(--line);border-radius:var(--radius);display:flex;flex-direction:column;
  min-height:230px;box-shadow:var(--shadow-sm)}
.day.today{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc),var(--shadow-sm)}
.day.dragover{outline:2px dashed var(--acc);outline-offset:-4px}
.day h3{padding:9px 11px 7px;font-size:.74rem;display:flex;justify-content:space-between;align-items:baseline;font-weight:700}
.day.today h3{color:var(--acc2)}
.day h3 .dload{font-size:.66rem;font-weight:600;color:var(--tx3);font-variant-numeric:tabular-nums}
.day h3 .dload.over{color:var(--red)}
.dmeter{height:3px;background:var(--bg4);margin:0 11px 6px;border-radius:2px;overflow:hidden}
.dmeter>div{height:100%;background:var(--grad);border-radius:2px}
.dmeter>div.over{background:var(--red)}
.day .dbody{padding:8px;flex:1;border-top:1px solid var(--line)}
.pl-task{background:var(--bg2);border:1px solid var(--line);border-left:3px solid var(--grey);border-radius:9px;
  padding:8px 9px;margin-bottom:7px;font-size:.76rem;cursor:grab;transition:border-color .15s,transform .12s}
.pl-task:hover{border-color:var(--acc);border-left-width:3px;transform:translateY(-1px)}
.pl-task.pc{border-left-color:var(--red)}.pl-task.ph{border-left-color:var(--amber)}.pl-task.pm{border-left-color:var(--yellow)}
.pl-task .pt{font-weight:600;line-height:1.35}
.pl-task .pm2{color:var(--tx3);font-size:.69rem;margin-top:3px}
.pl-task .blockind{color:var(--red);font-weight:700}
.pl-task.donei .pt{text-decoration:line-through;color:var(--tx3)}
.blockchip{display:flex;align-items:center;gap:6px;font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;
  color:var(--tx3);font-weight:700;margin:10px 1px 5px;padding-top:5px;border-top:1px dashed var(--line)}
.dbody .blockchip:first-child{margin-top:0;padding-top:0;border-top:none}
.bdot{width:7px;height:7px;border-radius:2.5px;flex-shrink:0;background:var(--grey)}
.bdot.bk-DeepWork{background:var(--acc)} .bdot.bk-Operations{background:var(--teal)}
.bdot.bk-Communications{background:var(--blue)} .bdot.bk-ReviewsApprovals{background:var(--purple)}
.bdot.bk-FinanceAdmin{background:var(--amber)} .bdot.bk-Research{background:var(--green)}
.bdot.bk-Buffer{background:var(--grey)} .bdot.bk-WeeklyReview{background:var(--yellow)}


/* ============ CHARTS (validated viz palette) ============ */
:root, :root[data-theme="dark"]{
  --cs1:#3987e5; --cs2:#008300; --cs3:#d55181; --cs4:#c98500;
  --cs5:#199e70; --cs6:#d95926; --cs7:#9085e9; --cs8:#e66767;
}
:root[data-theme="light"]{
  --cs1:#2a78d6; --cs2:#008300; --cs3:#e87ba4; --cs4:#eda100;
  --cs5:#1baf7a; --cs6:#eb6834; --cs7:#4a3aa7; --cs8:#e34948;
}
.bdot.bk-DeepWork{background:var(--cs1)} .bdot.bk-Operations{background:var(--cs2)}
.bdot.bk-Communications{background:var(--cs3)} .bdot.bk-ReviewsApprovals{background:var(--cs4)}
.bdot.bk-FinanceAdmin{background:var(--cs5)} .bdot.bk-Research{background:var(--cs6)}
.bdot.bk-Buffer{background:var(--cs7)} .bdot.bk-WeeklyReview{background:var(--cs8)}
.chart{margin-bottom:6px}
.crow{display:grid;grid-template-columns:170px 1fr 56px;gap:10px;align-items:center;margin-bottom:7px;font-size:.78rem}
.crow .cl{color:var(--tx2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crow .cv{color:var(--tx1);font-weight:700;font-variant-numeric:tabular-nums}
.cbar{height:18px;border-radius:0 4px 4px 0;background:var(--acc);min-width:2px;transition:width .4s ease}
.cbar-track{background:var(--bg3);border-radius:4px;height:18px;position:relative;display:flex;gap:2px}
.cstack{display:flex;gap:2px;height:18px;border-radius:4px;overflow:hidden;background:var(--bg3)}
.cseg{height:100%;min-width:2px}
.cseg:first-child{border-radius:4px 0 0 4px}.cseg:last-child{border-radius:0 4px 4px 0}
.clegend{display:flex;flex-wrap:wrap;gap:12px;margin:10px 0 2px;font-size:.72rem;color:var(--tx2)}
.clegend span{display:inline-flex;align-items:center;gap:5px}
.clegend .bdot{width:8px;height:8px;border-radius:3px}
.ctbl{margin-top:8px}
.ctbl summary{cursor:pointer;font-size:.72rem;color:var(--tx3)}
.ctbl table{margin-top:6px;font-size:.75rem}
.ctbl td,.ctbl th{padding:3px 10px}


/* ============ CANVAS ============ */
#cv-wrap{position:relative;border:1px solid var(--line);border-radius:var(--radius);background:var(--bg1);height:74vh;overflow:hidden;box-shadow:var(--shadow-sm);touch-action:none}
#cv-wrap svg{display:block;width:100%;height:100%;cursor:grab}
#cv-wrap svg.panning{cursor:grabbing}
.cv-node{cursor:pointer}
.cv-card{box-sizing:border-box;width:100%;height:100%;background:var(--bg2);border:1px solid var(--line);border-left:4px solid var(--grey);border-radius:10px;padding:8px 10px;font-family:inherit;overflow:hidden;box-shadow:var(--shadow-sm)}
.cv-card.pc{border-left-color:var(--red)}.cv-card.ph{border-left-color:var(--amber)}.cv-card.pm{border-left-color:var(--yellow)}
.cv-card.done{opacity:.4}
.cv-card .t{font-size:.72rem;font-weight:600;color:var(--tx1);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cv-card .m{font-size:.62rem;color:var(--tx3);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cv-card:hover{border-color:var(--acc)}
.cv-edge{fill:none;stroke:var(--line2);stroke-width:1.6;opacity:.75}
.cv-edge.blocked{stroke:var(--red);stroke-dasharray:5 4}
.cv-colhdr{font-size:.62rem;font-weight:700;letter-spacing:.1em;fill:var(--tx3)}
.cv-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.cv-hint{font-size:.72rem;color:var(--tx3)}


/* ============ PROJECT IDENTITY ============ */
.b.proj{--pc:var(--grey);background:color-mix(in srgb,var(--pc) 13%,transparent);color:var(--pc);
  border:1px solid color-mix(in srgb,var(--pc) 38%,transparent);font-weight:700;letter-spacing:.02em}
.b.proj::before{display:inline-block!important;content:"";width:7px;height:7px;border-radius:2px;background:var(--pc)}
tr.trow td:first-child{border-left:3px solid var(--pc,transparent)}
.pname{font-weight:700}
.proj-group{margin-bottom:22px}
.proj-hdr{--pc:var(--grey);display:flex;align-items:center;gap:9px;font-size:.95rem;font-weight:800;
  color:var(--pc);margin:0 0 10px;padding:6px 0 6px 12px;border-left:4px solid var(--pc);
  background:linear-gradient(90deg,color-mix(in srgb,var(--pc) 8%,transparent),transparent 70%);border-radius:4px}
.proj-hdr .pcount{background:color-mix(in srgb,var(--pc) 16%,transparent);border-radius:20px;padding:1px 10px;
  font-size:.72rem;font-variant-numeric:tabular-nums}
.clar-card{--pc:var(--grey);background:var(--bg1);border:1px solid var(--line);border-left:4px solid var(--pc);
  border-radius:10px;padding:13px 15px;margin-bottom:9px;cursor:pointer;box-shadow:var(--shadow-sm);
  transition:transform .12s,border-color .15s}
.clar-card:hover{transform:translateY(-1px);border-color:var(--pc)}
.clar-card .cc-t{font-size:.92rem;font-weight:700;line-height:1.35}
.clar-card .cc-q{margin-top:8px;background:color-mix(in srgb,var(--pc) 7%,var(--bg2));border:1px solid color-mix(in srgb,var(--pc) 18%,transparent);
  border-radius:8px;padding:8px 11px;font-size:.84rem;color:var(--tx1)}
.clar-card .cc-q b{color:var(--pc)}
.clar-card .cc-src{margin-top:7px;font-size:.7rem;color:var(--tx3)}
ul.clean li{padding:10px 2px;line-height:1.55}

/* ============ MISC ============ */
.small{font-size:.79rem;color:var(--tx2)}
.xs{font-size:.72rem;color:var(--tx3)}
ul.clean{list-style:none}
ul.clean li{padding:8px 0;border-bottom:1px solid var(--line)}
ul.clean li:last-child{border:none}
details.scoring{margin-bottom:16px}
details.scoring summary{cursor:pointer;color:var(--tx2);font-size:.82rem;font-weight:600}
details.scoring summary:hover{color:var(--tx1)}
.scoretbl{margin-top:8px}
.scoretbl td,.scoretbl th{padding:5px 12px;font-size:.78rem}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg4);
  border:1px solid var(--line2);color:var(--tx1);padding:10px 18px;border-radius:10px;font-size:.83rem;z-index:99;
  opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{
  header,nav,.filters,.hbtn{display:none!important}
  body{background:#fff!important;color:#000}
  section.tab{display:none}
  #tab-planner{display:block!important}
  .panel,.day,.pl-task{background:#fff!important;border-color:#999;color:#000;box-shadow:none!important}
  .pl-task .pm2,.day h3 .dload,.small,.xs{color:#444!important}
}
</style>

/* ================= STATE ================= */
const LS_KEY="tcc_state_v2";
let state=loadState();
function loadState(){
  try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s&&s.overrides)return s;}catch(e){}
  return {overrides:{},custom:[],hideCompleted:true};
}
function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(state));}
function resetLocal(){
  if(confirm("Discard all local edits, status changes and scheduling moves? This restores the dashboard to the generated snapshot.")){
    localStorage.removeItem(LS_KEY);state=loadState();renderAll();toast("Local changes reset");
  }
}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2200);}

/* ================= TASK ACCESS ================= */
function tasks(){
  const base=DATA.tasks.map(t=>Object.assign({},t,state.overrides[t.id]||{}));
  const custom=state.custom.map(t=>Object.assign({},t,state.overrides[t.id]||{}));
  return base.concat(custom);
}
function getTask(id){return tasks().find(t=>t.id===id);}
function patch(id,changes){
  if(changes.status==="Completed"){
    state.doneLog=(state.doneLog||[]).filter(e=>e.id!==id);
    state.doneLog.push({id:id,date:todayISO()});
  }else if(changes.status && changes.status!=="Completed"){
    state.doneLog=(state.doneLog||[]).filter(e=>e.id!==id);
  }
  state.overrides[id]=Object.assign({},state.overrides[id]||{},changes,{date_updated:todayISO()});
  saveState();renderAll();
}
function todayISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function isActive(t){return t.status!=="Completed"&&t.status!=="Cancelled";}
function isDone(t){return t.status==="Completed";}
function fmtH(h){if(h==null||isNaN(h))return "?";return h<1?(Math.round(h*60)+"m"):((h%1?h.toFixed(1):h)+"h");}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ================= SCORING (see panel on Today tab) ================= */
function daysUntil(d){if(!d||d==="unknown"||d==="")return null;return Math.round((new Date(d+"T12:00")-new Date(todayISO()+"T12:00"))/864e5);}
function score(t){
  let s=0;
  s+={Critical:30,High:20,Medium:10,Low:3}[t.priority]||0;
  s+={High:15,Medium:8,Low:2}[t.urgency]||0;
  s+={High:15,Medium:8,Low:2}[t.impact]||0;
  const du=daysUntil(t.due);
  if(du!==null){ if(du<0)s+=25; else if(du<=2)s+=20; else if(du<=7)s+=12; else if(du<=14)s+=6; }
  const ub=(t.unblocks||[]).length; s+=Math.min(ub*8,16);
  if((t.effort_hours||99)<=1 && t.impact==="High") s+=8;
  if(t.status==="Blocked") s-=15;
  if(t.status==="Waiting") s-=10;
  if(t.confidence==="Low") s-=5;
  return Math.round(s);
}
function isQuickWin(t){return isActive(t)&&t.status!=="Blocked"&&t.status!=="Waiting"&&(t.effort_hours||99)<=1&&t.impact==="High";}

function renderNav(){

    blockers:T.filter(t=>isActive(t)&&(t.status==="Blocked"||t.status==="Waiting")).length,

}

/* ================= TODAY + OVERVIEW ================= */
function mondayOf(offset){
  const base=new Date(todayISO()+"T12:00");const dow=(base.getDay()+6)%7;base.setDate(base.getDate()-dow+offset*7);
  return base.toISOString().slice(0,10);
}
function addDays(iso,n){const d=new Date(iso+"T12:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function renderToday(){
  const T=tasks(), A=T.filter(isActive), today=todayISO();
  const due=(t,n)=>{const d=daysUntil(t.due);return d!==null&&d<=n&&d>=0;};
  const overdue=A.filter(t=>{const d=daysUntil(t.due);return d!==null&&d<0;});
  const mon=mondayOf(0);
  const weekLoad=A.filter(t=>t.scheduled_date>=mon&&t.scheduled_date<=addDays(mon,6)).reduce((s,t)=>s+(t.effort_hours||0),0);
  const approvals=A.filter(t=>/approve|decide|decision|confirm|answer|pick |choose/i.test(t.title));
  const cards=[
    ["Active tasks",A.length,"acc"],["Critical",A.filter(t=>t.priority==="Critical").length,"crit"],
    ["High priority",A.filter(t=>t.priority==="High").length,"high"],
    ["Due today",A.filter(t=>due(t,0)).length,"high"],["Due this week",A.filter(t=>due(t,6)).length,"acc"],
    ["Overdue",overdue.length,"crit"],["Blocked",A.filter(t=>t.status==="Blocked").length,"crit"],
    ["Waiting on others",A.filter(t=>t.status==="Waiting").length,"wait"],
    ["My decisions",approvals.length,"wait"],
    ["Projects at risk",DATA.projects.filter(p=>["At Risk","Blocked","Stalled"].includes(p.health)).length,"warn"],
    ["Week workload",weekLoad.toFixed(0)+"h","ok"],["Quick wins",A.filter(isQuickWin).length,"ok"]
  ];
  const scheduledToday=A.filter(t=>t.scheduled_date===today&&t.status!=="Blocked").sort((a,b)=>score(b)-score(a));
  const pick=scheduledToday.length?scheduledToday:A.filter(t=>t.status!=="Blocked"&&t.status!=="Waiting").sort((a,b)=>score(b)-score(a));
  const top=pick.slice(0,5);
  let start=9*60;
  const items=top.map((t,i)=>{
    const st=Math.floor(start/60)+":"+String(start%60).padStart(2,"0");
    start+=Math.round((t.effort_hours||1)*60)+15;
    const done=isDone(t);
    return '<div class="todo-item '+(done?"donei":"")+'">'
      +'<div class="rank">'+(i+1)+'</div>'
      +'<input type="checkbox" '+(done?"checked":"")+' onchange="patch(\''+t.id+'\',{status:this.checked?\'Completed\':\'Ready\'})" title="Mark complete">'
      +'<div style="flex:1"><div><span class="ttl" style="font-weight:700" onclick="openInTasks(\''+t.id+'\')">'+esc(t.title)+'</span> '
      +''+projChip(t.project)+' <span class="b P-'+t.priority+'">'+t.priority+'</span> '
      +'<span class="xs">~'+fmtH(t.effort_hours)+' · start ~'+st+'</span></div>'
      +'<div class="why"><b>Why now:</b> '+esc(t.schedule_reason||("Highest score among unblocked work (score "+score(t)+")."))+'</div>'
      +'<div class="meta">Next action: '+esc(t.next_action)
      +((t.dependencies||[]).length?' · Depends on: '+esc(t.dependencies.join("; ")):"")
      +((t.blockers||[]).length?' · <span class="overdue">Blocker: '+esc(t.blockers.join("; "))+'</span>':"")
      +' · Source: <span class="mono">'+esc(shortSrc(t.source_file))+'</span></div></div></div>';
  }).join("");
  document.getElementById("tab-today").innerHTML=
    '<div class="cards">'+cards.map(c=>'<div class="card '+c[2]+'"><div class="n">'+c[1]+'</div><div class="l">'+c[0]+'</div></div>').join("")+'</div>'
    +(overdue.length?'<div class="panel tight" style="border-color:var(--crit)"><b style="color:var(--crit)">⚠ Overdue:</b> '+overdue.map(t=>'<span class="chip">'+esc(t.title)+' ('+t.due+')</span>').join(" ")+'</div>':"")
    +'<h2>🎯 Today — '+new Date(today+"T12:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})+'</h2>'
    +'<p class="small" style="margin-bottom:12px">Top '+top.length+' by score among today\'s scheduled, unblocked work. ~6h focus budget; 15-min buffers between tasks.</p>'
    +(items||'<p class="small">Nothing scheduled today — check the Week Planner.</p>')
    +scoringPanel();
}
function scoringPanel(){
  return '<details class="scoring panel tight"><summary>ℹ️ How tasks are scored</summary>'
  +'<table class="scoretbl"><tr><th>Factor</th><th>Points</th></tr>'
  +'<tr><td>Priority</td><td>Critical +30 · High +20 · Medium +10 · Low +3</td></tr>'
  +'<tr><td>Urgency</td><td>High +15 · Medium +8 · Low +2</td></tr>'
  +'<tr><td>Business impact</td><td>High +15 · Medium +8 · Low +2</td></tr>'
  +'<tr><td>Deadline proximity</td><td>Overdue +25 · ≤2 days +20 · ≤7 days +12 · ≤14 days +6</td></tr>'
  +'<tr><td>Unblocks other tasks</td><td>+8 per dependent task (cap +16)</td></tr>'
  +'<tr><td>Quick win</td><td>≤1h effort AND high impact: +8</td></tr>'
  +'<tr><td>Friction</td><td>Blocked −15 · Waiting −10 · Low confidence −5</td></tr></table>'
  +'<p class="xs" style="margin-top:6px">Blocked tasks are never scheduled as executable work; Waiting tasks only get their follow-up nudge scheduled.</p></details>';
}
function shortSrc(p){return (p||"").split("/").pop();}
function openInTasks(id){switchTab("tasks");setTimeout(function(){if(!expanded[id]){expanded[id]=true;renderTasks();}const r=document.getElementById("row-"+id);if(r)r.scrollIntoView({behavior:"smooth",block:"center"});},60);}

/* ================= MASTER TABLE ================= */
let F={q:"",project:"",category:"",priority:"",status:"",owner:"",dueFrom:"",dueTo:"",maxH:"",blocked:"",mine:false,recurring:"",sort:"score",dir:-1};
let expanded={};
function filterTasks(){
  let T=tasks();
  if(state.hideCompleted)T=T.filter(t=>!isDone(t)&&t.status!=="Cancelled");
  if(F.q){const q=F.q.toLowerCase();T=T.filter(t=>(t.title+" "+t.description+" "+t.project+" "+t.next_action+" "+(t.source_file||"")).toLowerCase().includes(q));}
  if(F.project)T=T.filter(t=>t.project===F.project);
  if(F.category)T=T.filter(t=>t.category===F.category);
  if(F.priority)T=T.filter(t=>t.priority===F.priority);
  if(F.status)T=T.filter(t=>t.status===F.status);
  if(F.owner)T=T.filter(t=>(t.owner||"unknown")===F.owner);
  if(F.dueFrom)T=T.filter(t=>t.due&&t.due!=="unknown"&&t.due>=F.dueFrom);
  if(F.dueTo)T=T.filter(t=>t.due&&t.due!=="unknown"&&t.due<=F.dueTo);
  if(F.maxH)T=T.filter(t=>(t.effort_hours||0)<=parseFloat(F.maxH));
  if(F.blocked==="blocked")T=T.filter(t=>t.status==="Blocked");
  if(F.blocked==="unblocked")T=T.filter(t=>t.status!=="Blocked");
  if(F.mine)T=T.filter(t=>t.requires_aram);
  if(F.recurring==="yes")T=T.filter(t=>t.recurring);
  if(F.recurring==="no")T=T.filter(t=>!t.recurring);
  const key=F.sort;
  T.sort((a,b)=>{
    let va,vb;
    if(key==="score"){va=score(a);vb=score(b);}
    else if(key==="due"){va=(a.due&&a.due!=="unknown")?a.due:"9999";vb=(b.due&&b.due!=="unknown")?b.due:"9999";}
    else if(key==="effort_hours"){va=a.effort_hours||0;vb=b.effort_hours||0;}
    else {va=(a[key]||"").toString().toLowerCase();vb=(b[key]||"").toString().toLowerCase();}
    return (va<vb?-1:va>vb?1:0)*F.dir;
  });
  return T;
}

/* ================= PLANNER ================= */
let weekOffset=0;
const BLOCK_ORDER=["Deep Work","Operations","Communications","Reviews & Approvals","Finance & Admin","Research","Buffer","Weekly Review"];
function renderPlanner(){
  const mon=mondayOf(weekOffset);
  const days=[];for(let i=0;i<7;i++)days.push(addDays(mon,i));
  const T=tasks();
  const cap=i=>i<5?6:(i===5?3:1);
  const unscheduled=T.filter(t=>isActive(t)&&!t.scheduled_date&&t.status!=="Blocked"&&t.status!=="Waiting"&&(t.priority==="Critical"||t.priority==="High"));
  document.getElementById("tab-planner").innerHTML=
  '<div class="pl-head"><button class="hbtn" onclick="weekOffset--;renderPlanner()">← Prev</button>'
  +'<h2 style="margin:0">Week of '+new Date(mon+"T12:00").toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})+(weekOffset===0?" (current)":"")+'</h2>'
  +'<button class="hbtn" onclick="weekOffset++;renderPlanner()">Next →</button>'
  +(weekOffset!==0?'<button class="hbtn" onclick="weekOffset=0;renderPlanner()">This week</button>':"")
  +'<span class="xs">Drag tasks between days · Mon–Fri ≈ 6h focus · Sat catch-up ≈ 3h · Sun mostly clear</span></div>'
  +(weekOffset===0?summaryHTML(T,mon):"")
  +'<div class="week">'+days.map(function(d,i){
    let dt=T.filter(t=>t.scheduled_date===d&&t.status!=="Cancelled");
    if(state.hideCompleted)dt=dt.filter(t=>!isDone(t));
    dt.sort((a,b)=>(BLOCK_ORDER.indexOf(a.scheduled_block||"Operations")-BLOCK_ORDER.indexOf(b.scheduled_block||"Operations"))||(score(b)-score(a)));
    const load=dt.filter(isActive).reduce((s,t)=>s+(t.effort_hours||0),0);
    const over=load>cap(i);
    let lastBlock=null;
    const body=dt.map(function(t){
      const blk=t.scheduled_block||"Operations";
      const hdr=blk!==lastBlock?'<div class="blockchip"><span class="bdot bk-'+blk.replace(/[^A-Za-z]/g,"")+'"></span>'+blk+'</div>':""; lastBlock=blk;
      return hdr+'<div class="pl-task '+(t.priority==="Critical"?"pc":t.priority==="High"?"ph":t.priority==="Medium"?"pm":"")+' '+(isDone(t)?"donei":"")+'" draggable="true" ondragstart="event.dataTransfer.setData(\'text\',\''+t.id+'\')" title="'+esc(t.schedule_reason||"")+'">'
        +'<div class="pt"><input type="checkbox" '+(isDone(t)?"checked":"")+' onchange="patch(\''+t.id+'\',{status:this.checked?\'Completed\':\'Ready\'})" style="vertical-align:-2px"> <span style="cursor:pointer" onclick="openInTasks(\''+t.id+'\')">'+esc(t.title)+'</span></div>'
        +'<div class="pm2">'+projName(t.project)+' · '+fmtH(t.effort_hours)+' · <span class="b P-'+t.priority+'" style="font-size:.62rem">'+t.priority+'</span>'+((t.blockers||[]).length?' <span class="blockind">⛔</span>':"")+((t.dependencies||[]).length?" 🔗":"")+'</div>'
        +(t.schedule_reason?'<div class="pm2" style="font-style:italic">'+esc(t.schedule_reason)+'</div>':"")+'</div>';
    }).join("");
    return '<div class="day '+(d===todayISO()?"today":"")+'" ondragover="event.preventDefault();this.classList.add(\'dragover\')" ondragleave="this.classList.remove(\'dragover\')" ondrop="dropDay(event,\''+d+'\');this.classList.remove(\'dragover\')">'
      +'<h3>'+new Date(d+"T12:00").toLocaleDateString("en-US",{weekday:"short"})+' '+d.slice(5)+'<span class="dload '+(over?"over":"")+'">'+load.toFixed(1)+'h / '+cap(i)+'h'+(over?" ⚠":"")+'</span></h3>'+'<div class="dmeter"><div class="'+(over?"over":"")+'" style="width:'+Math.min(100,load/cap(i)*100).toFixed(0)+'%"></div></div>'
      +'<div class="dbody">'+(body||'<p class="xs" style="padding:4px">—</p>')+'</div></div>';
  }).join("")+'</div>'
  +(unscheduled.length?'<div class="panel tight" style="margin-top:14px;border-color:var(--high)"><b style="color:var(--high)">⚠ High-priority but unscheduled:</b> '+unscheduled.map(t=>'<span class="chip" style="cursor:pointer" onclick="openInTasks(\''+t.id+'\')">'+esc(t.title)+'</span>').join(" ")+'<br><span class="xs">These didn\'t fit this week\'s capacity — pull one in by dragging, or edit its scheduled date in All Tasks.</span></div>':"");
}
function dropDay(ev,date){ev.preventDefault();const id=ev.dataTransfer.getData("text");if(id){const t=getTask(id);patch(id,{scheduled_date:date,status:(t&&t.status==="Not Started")?"Scheduled":(t?t.status:"Scheduled"),schedule_reason:"Manually placed"});toast("Rescheduled to "+date);}}
function summaryHTML(T,mon){
  const S=DATA.meta.summary||{};
  const wk=T.filter(t=>isActive(t)&&t.scheduled_date>=mon&&t.scheduled_date<=addDays(mon,6));
  const load=wk.reduce((s,t)=>s+(t.effort_hours||0),0);
  const capTotal=6*4+3; /* Tue-Fri + Sat this week (Mon already past at generation) */
  const gap=capTotal-load;

function dl(name,content,mime){const b=new Blob([content],{type:mime});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click();URL.revokeObjectURL(a.href);}
function csvEsc(v){v=(v==null)?"":String(v);return /[",\n]/.test(v)?('"'+v.replace(/"/g,'""')+'"'):v;}
const CSV_COLS=["id","title","description","project","business","category","priority","status","owner","due","effort_hours","dependencies","blockers","next_action","scheduled_date","scheduled_block","schedule_reason","source_file","source_ref","extraction_type","confidence","date_identified","date_updated","recurring","requires_aram","impact","urgency","needs_clarification","clarification_question","score"];
function exportTasksCSV(){
  const rows=tasks().map(t=>CSV_COLS.map(function(c){
    if(c==="score")return score(t);
    let v=t[c];if(Array.isArray(v))v=v.join("; ");return csvEsc(v);
  }).join(","));
  dl("task_database.csv",CSV_COLS.join(",")+"\n"+rows.join("\n"),"text/csv");toast("task_database.csv downloaded");
}
function exportWeekCSV(){
  const mon=mondayOf(weekOffset);
  const cols=["scheduled_date","scheduled_block","title","project","priority","status","effort_hours","due","schedule_reason"];
  const rows=tasks().filter(t=>t.scheduled_date>=mon&&t.scheduled_date<=addDays(mon,6)).sort((a,b)=>a.scheduled_date<b.scheduled_date?-1:1)
    .map(t=>cols.map(c=>csvEsc(t[c])).join(","));
  dl("weekly_plan.csv",cols.join(",")+"\n"+rows.join("\n"),"text/csv");toast("weekly_plan.csv downloaded");
}
function exportJSON(){
  dl("task_database.json",JSON.stringify({meta:DATA.meta,projects:DATA.projects,tasks:tasks()},null,2),"application/json");toast("task_database.json downloaded");
}
function importJSON(ev){
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(){try{
    const obj=JSON.parse(r.result);
    const list=obj.tasks||obj;
    if(!Array.isArray(list))throw new Error("no tasks array");
    const known=new Set(DATA.tasks.map(t=>t.id));
    state.custom=[];
    list.forEach(function(t){
      if(known.has(t.id)){state.overrides[t.id]=Object.assign({},t);}
      else state.custom.push(t);
    });
    saveState();renderAll();toast("Imported "+list.length+" tasks");
  }catch(e){alert("Import failed: "+e.message);}};
  r.readAsText(f);ev.target.value="";
}

const BLOCK_CS={"Deep Work":"var(--cs1)","Operations":"var(--cs2)","Communications":"var(--cs3)","Reviews & Approvals":"var(--cs4)","Finance & Admin":"var(--cs5)","Research":"var(--cs6)","Buffer":"var(--cs7)","Weekly Review":"var(--cs8)"};
function hbarChart(title,hint,rows,color){
  const max=Math.max(...rows.map(r=>r[1]),1);

   +rows.map(r=>'<div class="crow" title="'+esc(r[0])+': '+r[1]+'"><span class="cl">'+esc(r[0])+'</span>'
     +'<div class="cbar-track"><div class="cbar" style="width:'+(r[1]/max*100).toFixed(1)+'%;background:'+(r[2]||color||"var(--acc)")+'"></div></div>'
     +'<span class="cv">'+r[1]+'</span></div>').join("")
   +'</div><details class="ctbl"><summary>table view</summary><table><tr><th>'+title+'</th><th>Value</th></tr>'
   +rows.map(r=>'<tr><td>'+esc(r[0])+'</td><td>'+r[1]+'</td></tr>').join("")+'</table></details></div>';

function renderCharts(){
  const T=tasks(),A=T.filter(isActive);
  const byProj={};
  A.forEach(t=>{byProj[t.project]=(byProj[t.project]||0)+(t.effort_hours||0);});
  const projRows=Object.entries(byProj).map(([k,v])=>[k,Math.round(v*10)/10]).sort((a,b)=>b[1]-a[1]).filter(r=>r[1]>0);
  const stColor={"Not Started":"var(--grey)","Ready":"var(--teal)","In Progress":"var(--blue)","Waiting":"var(--purple)","Blocked":"var(--red)","Needs Review":"var(--teal)","Scheduled":"var(--green)","Completed":"var(--green)"};
  const byStatus={};T.filter(t=>t.status!=="Cancelled").forEach(t=>{byStatus[t.status]=(byStatus[t.status]||0)+1;});
  const stRows=Object.entries(byStatus).sort((a,b)=>b[1]-a[1]).map(([k,v])=>[k,v,stColor[k]||"var(--grey)"]);
  const prColor={"Critical":"var(--red)","High":"var(--amber)","Medium":"var(--yellow)","Low":"var(--grey)"};
  const prRows=["Critical","High","Medium","Low"].map(p=>[p,A.filter(t=>t.priority===p).length,prColor[p]]);
  const mon=mondayOf(0);
  const blocks=BLOCK_ORDER.slice(0,6);
  let usedBlocks=new Set();
  let dayMax=1;const dayData=[];
  for(let i=0;i<7;i++){const d=addDays(mon,i);
    const dt=T.filter(t=>t.scheduled_date===d&&isActive(t));
    const per={};let tot=0;
    dt.forEach(t=>{const b=t.scheduled_block||"Operations";per[b]=(per[b]||0)+(t.effort_hours||0);tot+=(t.effort_hours||0);});
    dayData.push([d,per,tot]);if(tot>dayMax)dayMax=tot;}
  const stackHTML=dayData.map(([d,per,tot])=>{
    const segs=blocks.filter(b=>per[b]).map(b=>{usedBlocks.add(b);
      return '<div class="cseg" style="flex:'+per[b]+';background:'+BLOCK_CS[b]+'" title="'+b+': '+per[b].toFixed(1)+'h"></div>';}).join("");
    return '<div class="crow" title="'+d+': '+tot.toFixed(1)+'h"><span class="cl">'+new Date(d+"T12:00").toLocaleDateString("en-US",{weekday:"short"})+' '+d.slice(5)+'</span>'
      +'<div style="width:'+(tot/dayMax*100).toFixed(1)+'%;min-width:'+(tot?"8":"0")+'px"><div class="cstack">'+(segs||"")+'</div></div>'
      +'<span class="cv">'+(tot?tot.toFixed(1)+"h":"—")+'</span></div>';}).join("");
  const legend='<div class="clegend">'+blocks.filter(b=>usedBlocks.has(b)).map(b=>'<span><span class="bdot" style="background:'+BLOCK_CS[b]+'"></span>'+b+'</span>').join("")+'</div>';
  const log=state.doneLog||[];
  const velRows=[];
  for(let i=13;i>=0;i--){
    const d=addDays(todayISO(),-i);
    velRows.push([new Date(d+"T12:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}),log.filter(e=>e.date===d).length]);
  }
  const velTotal=log.length;
  document.getElementById("tab-charts").innerHTML=
   '<div class="grid2">'
   +hbarChart("Open workload by project","Estimated hours of active (not completed) work per project.",projRows)
   +hbarChart("Status distribution","Where all "+T.filter(t=>t.status!=="Cancelled").length+" tracked tasks sit right now.",stRows)
   +hbarChart("Priority mix (active tasks)","Count of active tasks per priority level.",prRows)
   +'<div class="panel"><h2>This week by day & block</h2><p class="xs" style="margin-bottom:12px">Scheduled hours per day, split by work block. Hover a segment for its hours.</p><div class="chart">'+stackHTML+'</div>'+legend
   +'<details class="ctbl"><summary>table view</summary><table><tr><th>Day</th>'+blocks.map(b=>"<th>"+b+"</th>").join("")+'</tr>'
   +dayData.map(([d,per])=>'<tr><td>'+d+'</td>'+blocks.map(b=>'<td>'+(per[b]?per[b].toFixed(1):"—")+'</td>').join("")+'</tr>').join("")+'</table></details></div>'
   +hbarChart("Completion velocity — last 14 days","Tasks checked off per day ("+velTotal+" logged so far; builds up as you use the dashboard).",velRows,"var(--green)")
   +'</div>';
}

/* ================= CANVAS (dependency graph) ================= */
let CV={proj:"",view:{x:0,y:0,k:1},drag:null,pan:null};
const CVW=260,CVH=84,CVGX=70,CVGY=24;
function cvGraph(){
  const T=tasks().filter(t=>t.status!=="Cancelled");
  const byT={};T.forEach(t=>byT[t.title.trim().toLowerCase()]=t.id);
  const id2={};T.forEach(t=>id2[t.id]=t);
  let edges=[];
  T.forEach(t=>(t.dependencies||[]).forEach(d=>{const s=byT[d.trim().toLowerCase()];if(s&&s!==t.id)edges.push([s,t.id]);}));
  const inWeb=new Set();edges.forEach(e=>{inWeb.add(e[0]);inWeb.add(e[1]);});
  let nodes=T.filter(t=>inWeb.has(t.id));
  if(CV.proj){
    const pid=new Set(nodes.filter(t=>t.project===CV.proj).map(t=>t.id));
    const keep=new Set(pid);
    edges.forEach(e=>{if(pid.has(e[0])||pid.has(e[1])){keep.add(e[0]);keep.add(e[1]);}});
    nodes=nodes.filter(t=>keep.has(t.id));
    edges=edges.filter(e=>keep.has(e[0])&&keep.has(e[1]));
  }
  const nid=new Set(nodes.map(n=>n.id));
  edges=edges.filter(e=>nid.has(e[0])&&nid.has(e[1]));
  const parents={};edges.forEach(e=>{(parents[e[1]]=parents[e[1]]||[]).push(e[0]);});
  const depth={},seen={};
  function dep(id){
    if(depth[id]!=null)return depth[id];
    if(seen[id])return 0;
    seen[id]=1;
    const ps=(parents[id]||[]);
    depth[id]=ps.length?1+Math.max(...ps.map(dep)):0;
    return depth[id];
  }
  nodes.forEach(n=>dep(n.id));
  return {nodes,edges,depth,id2};
}
function cvLayout(g){
  const cols={};
  g.nodes.forEach(n=>{(cols[g.depth[n.id]]=cols[g.depth[n.id]]||[]).push(n);});
  const pos={};
  Object.keys(cols).map(Number).sort((a,b)=>a-b).forEach(d=>{
    cols[d].sort((a,b)=>a.project<b.project?-1:a.project>b.project?1:score(b)-score(a));
    cols[d].forEach((n,i)=>{
      pos[n.id]={x:40+d*(CVW+CVGX),y:56+i*(CVH+CVGY)};
    });
  });
  const saved=state.canvasPos||{};
  Object.keys(saved).forEach(id=>{if(pos[id])pos[id]=saved[id];});
  return pos;
}
function cvNodeHTML(t){
  const pcls=t.priority==="Critical"?"pc":t.priority==="High"?"ph":t.priority==="Medium"?"pm":"";
  const dcls=isDone(t)?"done":"";
  return '<div class="cv-card '+pcls+' '+dcls+'" xmlns="http://www.w3.org/1999/xhtml">'
    +'<div class="t">'+esc(t.title)+'</div>'
    +'<div class="m">'+projName(t.project)+' · '+fmtH(t.effort_hours)+' · '+esc(t.status)
    +((t.unblocks||[]).length?' · 🔓'+(t.unblocks||[]).length:'')+'</div></div>';
}
function cvEdgePath(pos,a,b){
  const p1=pos[a],p2=pos[b];if(!p1||!p2)return "";
  const x1=p1.x+CVW,y1=p1.y+CVH/2,x2=p2.x,y2=p2.y+CVH/2;
  const mx=(x1+x2)/2;
  return "M"+x1+" "+y1+" C"+mx+" "+y1+","+mx+" "+y2+","+(x2-7)+" "+y2;
}
function renderCanvas(){
  const g=cvGraph();
  const pos=cvLayout(g);
  const projs=uniq(tasks().map(t=>t.project));
  const maxX=Math.max(...Object.values(pos).map(p=>p.x+CVW),400)+60;
  const maxY=Math.max(...Object.values(pos).map(p=>p.y+CVH),300)+60;
  const depths=[...new Set(g.nodes.map(n=>g.depth[n.id]))].sort((a,b)=>a-b);
  const hdrs=depths.map(d=>'<text class="cv-colhdr" x="'+(40+d*(CVW+CVGX))+'" y="34">'+(d===0?"UNLOCKS FIRST":"THEN — STEP "+(d+1))+'</text>').join("");
  const edgeSVG=g.edges.map(e=>{
    const t=g.id2[e[1]];
    return '<path id="edge-'+e[0]+'-'+e[1]+'" class="cv-edge '+(t.status==="Blocked"?"blocked":"")+'" marker-end="url(#cvarrow)" d="'+cvEdgePath(pos,e[0],e[1])+'"/>';
  }).join("");
  const nodeSVG=g.nodes.map(n=>{
    const p=pos[n.id];
    return '<g class="cv-node" data-id="'+n.id+'" transform="translate('+p.x+','+p.y+')">'
      +'<foreignObject width="'+CVW+'" height="'+CVH+'">'+cvNodeHTML(n)+'</foreignObject></g>';
  }).join("");
  document.getElementById("tab-canvas").innerHTML=
   '<div class="cv-toolbar">'
   +'<select onchange="CV.proj=this.value;renderCanvas()"><option value="">All projects</option>'
   +projs.map(p=>'<option '+(p===CV.proj?"selected":"")+'>'+esc(p)+'</option>').join("")+'</select>'
   +'<button class="hbtn" onclick="cvFit()">⤢ Fit</button>'
   +'<button class="hbtn" onclick="delete state.canvasPos;saveState();renderCanvas()">↺ Reset layout</button>'
   +'<span class="cv-hint">'+g.nodes.length+' linked tasks · '+g.edges.length+' dependencies · drag background to pan · scroll to zoom · drag cards to arrange · click a card to open it · dashed red = blocked</span>'
   +'</div>'
   +'<div id="cv-wrap"><svg id="cv-svg">'
   +'<defs><marker id="cvarrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="var(--line2)"/></marker></defs>'
   +'<g id="cv-root">'+hdrs+'<g id="cv-edges">'+edgeSVG+'</g><g id="cv-nodes">'+nodeSVG+'</g></g>'
   +'</svg></div>';
  CV._extent={w:maxX,h:maxY};CV._pos=pos;CV._graph=g;
  cvFit(true);
  cvBind();
}
function cvApply(){
  const r=document.getElementById("cv-root");
  if(r)r.setAttribute("transform","translate("+CV.view.x+","+CV.view.y+") scale("+CV.view.k+")");
}
function cvFit(initial){
  const wrap=document.getElementById("cv-wrap");
  if(!wrap||!CV._extent)return;
  const k0=Math.min(wrap.clientWidth/CV._extent.w, wrap.clientHeight/CV._extent.h, 1);
  /* initial render: readable zoom, pan to explore; Fit button: whole map */
  const k=initial===true?Math.max(k0,0.62):Math.max(k0,0.15);
  CV.view={x:12,y:12,k:k};
  cvApply();
  if(initial!==true)toast("Fit: whole map");
}
function cvClient(e){const r=document.getElementById("cv-svg").getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}
function cvBind(){
  const svg=document.getElementById("cv-svg");
  if(!svg)return;
  svg.addEventListener("wheel",e=>{
    e.preventDefault();
    const c=cvClient(e);
    const f=Math.pow(1.0015,-e.deltaY);
    const k2=Math.min(2.5,Math.max(0.15,CV.view.k*f));
    CV.view.x=c.x-(c.x-CV.view.x)*(k2/CV.view.k);
    CV.view.y=c.y-(c.y-CV.view.y)*(k2/CV.view.k);
    CV.view.k=k2;cvApply();
  },{passive:false});
  svg.addEventListener("pointerdown",e=>{
    const nodeG=e.target.closest(".cv-node");
    const c=cvClient(e);
    if(nodeG){
      const id=nodeG.getAttribute("data-id");
      CV.drag={id:id,node:nodeG,start:c,orig:Object.assign({},CV._pos[id]),moved:false};
    }else{
      CV.pan={start:c,orig:Object.assign({},CV.view)};
      svg.classList.add("panning");
    }
    svg.setPointerCapture(e.pointerId);
  });
  svg.addEventListener("pointermove",e=>{
    const c=cvClient(e);
    if(CV.drag){
      const dx=(c.x-CV.drag.start.x)/CV.view.k, dy=(c.y-CV.drag.start.y)/CV.view.k;
      if(Math.abs(dx)+Math.abs(dy)>3)CV.drag.moved=true;
      const p={x:CV.drag.orig.x+dx,y:CV.drag.orig.y+dy};
      CV._pos[CV.drag.id]=p;
      CV.drag.node.setAttribute("transform","translate("+p.x+","+p.y+")");
      CV._graph.edges.forEach(ed=>{
        if(ed[0]===CV.drag.id||ed[1]===CV.drag.id){
          const el=document.getElementById("edge-"+ed[0]+"-"+ed[1]);
          if(el)el.setAttribute("d",cvEdgePath(CV._pos,ed[0],ed[1]));
        }
      });
    }else if(CV.pan){
      CV.view.x=CV.pan.orig.x+(c.x-CV.pan.start.x);
      CV.view.y=CV.pan.orig.y+(c.y-CV.pan.start.y);
      cvApply();
    }
  });
  svg.addEventListener("pointerup",e=>{
    if(CV.drag){
      if(CV.drag.moved){
        state.canvasPos=state.canvasPos||{};
        state.canvasPos[CV.drag.id]=CV._pos[CV.drag.id];
        saveState();
      }else{
        openInTasks(CV.drag.id);
      }
      CV.drag=null;
    }
    CV.pan=null;
    document.getElementById("cv-svg").classList.remove("panning");
  });
}

  <form id="lockform" style="display:flex;gap:8px" onsubmit="return false">
    <input id="pwin" type="password" placeholder="passcode" autocomplete="current-password" autofocus
      style="background:var(--bg2);border:1px solid var(--line);color:var(--tx1);border-radius:9px;padding:10px 14px;font-size:1rem;font-family:inherit;width:200px">
    <button class="hbtn primary" style="font-size:.9rem;padding:10px 18px" onclick="tryUnlock()">Unlock</button>
  </form>
  <p id="lockerr" class="xs" style="color:var(--red);min-height:1em"></p>
</div>
<script>
function b64d(s){const b=atob(s),a=new Uint8Array(b.length);for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i);return a;}
async function tryUnlock(){
  const pw=document.getElementById("pwin").value;
  const err=document.getElementById("lockerr");
  if(!pw)return;
  err.textContent="";
  try{
    const salt=b64d(PROTECTED.s),iv=b64d(PROTECTED.i),ct=b64d(PROTECTED.c);
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:250000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
    const ds=new DecompressionStream("gzip");
    const dec=await new Response(new Blob([pt]).stream().pipeThrough(ds)).text();
    DATA=JSON.parse(dec);
    sessionStorage.setItem("tcc_pw",pw);
    document.getElementById("lockscreen").remove();
    renderAll();
  }catch(e){err.textContent="Wrong passcode.";}
}
document.getElementById("pwin").addEventListener("keydown",e=>{if(e.key==="Enter")tryUnlock();});
(function(){const pw=sessionStorage.getItem("tcc_pw");if(pw){document.getElementById("pwin").value=pw;tryUnlock();}})();
</script>

</body>
</html>
